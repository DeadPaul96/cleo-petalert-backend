version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./mojo_core:/app/mojo_core
    environment:
      - POSTGRES_USER=cleo_admin
      - POSTGRES_PASSWORD=cleo_secret
      - POSTGRES_DB=cleo_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=cleo_admin
      - POSTGRES_PASSWORD=cleo_secret
      - POSTGRES_DB=cleo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleo_admin -d cleo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
